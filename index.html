<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<style>
body{
    margin:0;
    font-family:'Courier New', monospace;
    background:linear-gradient(to bottom,#ffb6d5,#ffcce6);
    text-align:center;
    color:#ff1493;
    overflow-x:hidden;
}

h1{
    margin-top:40px;
    font-size:26px;
}

/* ENVELOPE */
.envelope{
    width:260px;
    height:160px;
    background:#ff8dc7;
    margin:80px auto;
    position:relative;
    border-radius:10px;
    cursor:pointer;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff69b4;
    top:0;
    left:0;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transition:0.8s;
    transform-origin:top;
}

/* LETTER */
.paper{
    width:320px;
    background:white;
    padding:20px;
    margin:20px auto;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    display:none;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* PHOTO */
.photo-frame{
    margin-top:15px;
    opacity:0;
    transform:translateY(20px);
    transition:1s;
}

.photo-frame.show{
    opacity:1;
    transform:translateY(0);
}

.photo-frame img{
    width:220px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(255,105,180,0.5);
}

.caption{
    margin-top:8px;
    font-size:14px;
    color:#ff69b4;
}

/* BUTTON */
button{
    padding:10px 20px;
    border:none;
    background:#ff69b4;
    color:white;
    border-radius:20px;
    cursor:pointer;
    margin-top:15px;
}

/* CINEMATIC */
.cinematic{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    top:0;
    left:0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    opacity:0;
    transition:2s;
    z-index:100;
    text-align:center;
}

.cinematic.show{
    opacity:1;
}

/* FOOTER */
.footer{
    margin-top:40px;
    font-size:12px;
    color:#c71585;
}

/* HEART FALL */
.heart{
    position:absolute;
    color:pink;
    animation:fall 5s linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<h1>💗 For Someone Very Special 💗</h1>

<div class="envelope" onclick="openLetter()">
    <div class="flap" id="flap"></div>
</div>

<div class="paper" id="letter">
    <h2>I'm Sorry 💌</h2>
    <p>
    I know I made mistakes.<br><br>
    I never meant to hurt you.<br>
    You mean everything to me.<br><br>
    Please forgive me... 💖
    </p>

    <div class="photo-frame" id="photo">
        <img src="foto1.jpg">
        <div class="caption">
            Even simple moments with you mean everything 💕
        </div>
    </div>

    <button onclick="cinematic()">Finish 💗</button>
</div>

<div class="cinematic" id="cinematicText">
    The program is finished,<br><br>
    but my love for you never ends. 💞
</div>

<div class="footer">
    Powered by Raihan Nadir Widodo 💕
</div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
function openLetter(){
    document.getElementById("flap").style.transform="rotateX(180deg)";
    document.getElementById("letter").style.display="block";
    document.getElementById("beep").play();

    setTimeout(()=>{
        document.getElementById("photo").classList.add("show");
    },800);
}

function cinematic(){
    document.getElementById("cinematicText").classList.add("show");
}

function createHearts(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=Math.random()*20+15+"px";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove()},5000);
}
setInterval(createHearts,600);
</script>

</body>
</html>
